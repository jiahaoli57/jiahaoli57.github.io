<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: "en" }}">

  {% include head.html %}

  <body>
  <!-- Google Tag Manager (noscript) -->
  <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-5FBDZ9C"
  height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
  <!-- End Google Tag Manager (noscript) -->


    <main class="homepage" aria-label="Content">
      <div class="wrapper">
        {{ content }}
      </div>
    </main>

    {% include footer.html %}
    
  <script>
    // 给所有有text类名的元素绑定点击事件
    $(".bib").click(function(){
      // 获取当前元素的data-bib属性的值，作为本地bib文件的路径
      var bibPath = $(this).data("bib");
      // 使用jquery的ajax方法，读取本地bib文件的内容
      $.ajax({
        url: bibPath,
        dataType: "text",
        success: function(bib){
          // 调用layer的open方法，显示一个bib文件框
          layer.open({
            type: 1,
            title: "bibtex",
            content: "<pre id='bib-content'>" + bib + "</pre>",
            area: ["auto", "auto"],
            btn: ["copy", "cancel"],
            // 设置复制按钮的回调函数
            yes: function(index, layero) {
              // 创建一个clipboard对象，绑定复制按钮和要复制的内容
              var clipboard = new ClipboardJS(".layui-layer-btn0", {
                text: function() {
                  return $("#bib-content").text();
                }
              });
              // 监听复制成功的事件
              clipboard.on("success", function(e) {
                // 提示复制成功
                layer.msg("Success");
                // 释放clipboard对象
                clipboard.destroy();
              });
              // 监听复制失败的事件
              clipboard.on("error", function(e) {
                // 提示复制失败
                layer.msg("Failure");
                // 释放clipboard对象
                clipboard.destroy();
              });
            }
          });
        },
        error: function(){
          // 如果读取失败，显示一个错误信息
          layer.msg("读取本地bib文件失败");
        }
      });
    });
  </script>
    
  </body>
</html>
