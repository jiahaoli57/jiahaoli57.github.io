<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: "en" }}">

  {% include head.html %}

  <body>
  <!-- Google Tag Manager (noscript) -->
  <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-5FBDZ9C"
  height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
  <!-- End Google Tag Manager (noscript) -->


    <main class="homepage" aria-label="Content">
      <div class="wrapper">
        {{ content }}
      </div>
    </main>

    {% include footer.html %}
    
  <script>
    // 给所有有text类名的元素绑定点击事件
    $(".bib").click(function(){
      // 获取当前元素的data-bib属性的值，作为本地bib文件的路径
      var bibPath = $(this).data("bib");
      // 使用jquery的ajax方法，读取本地bib文件的内容
      $.ajax({
        url: bibPath,
        dataType: "text",
        success: function(bib){
          // 调用layer的open方法，显示一个bib文件框
          layer.open({
            type: 1,
            title: "bibtex",
            content: "<pre>" + bib + "</pre>",
            area: ["auto", "auto"],
            btn: ["copy", "cancel"],
            // 设置弹窗的按钮回调函数
            yes: function(index, layero) {
              // 获取文本框元素
              var input = document.getElementById("copy-text");
              // 设置文本框的值为弹窗的内容
              input.value = layero.find(".layui-layer-content").text();
              // 选中文本框的内容
              input.select();
              // 复制选中的内容
              document.execCommand("copy");
              // 关闭弹窗
              layer.close(index);
              // 提示复制成功
              layer.msg("复制成功");
            }
          });
        },
        error: function(){
          // 如果读取失败，显示一个错误信息
          layer.msg("读取本地bib文件失败");
        }
      });
    });
  </script>
    
  </body>
</html>
